
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Alunos - Sistema de Gestão</title>

    <link rel="stylesheet" href="../css/alunos.css">
    <link rel="stylesheet" href="../tema/tema.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="barra-lateral">

        <div>

            <div class="logo">
                <h2>📚 Cursos</h2>
                <span>Painel Administrativo</span>
            </div>

            <nav class="menu">

                <a href="../index.html">🏠 Dashboard</a>
                <a href="cursos.html">📖 Cursos</a>
                <a href="alunos.html" class="ativo">👨‍🎓 Alunos</a>
                <a href="matriculas.html">📝 Matrículas</a>
                <a href="notas.html">📊 Notas</a>
                <a href="certificados.html">🏆 Certificados</a>

            </nav>

        </div>

        <div class="rodape-menu">
            <button id="alternarTema">🌙 Alterar Tema</button>
        </div>

    </aside>

    <!-- CONTEÚDO -->
    <main class="conteudo">

        <header class="cabecalho">
            <div>
                <h1>Gerenciamento de Alunos</h1>
                <p>Cadastre e gerencie os alunos do sistema</p>
            </div>
        </header>

        <!-- FORMULÁRIO -->
        <section class="formulario">

            <h2>Novo Aluno</h2>

            <div class="grupo-formulario">
                <label>Nome</label>
                <input type="text" id="nomeAluno" placeholder="Nome do aluno">
            </div>

            <div class="grupo-formulario">
                <label>Idade</label>
                <input type="number" id="idadeAluno" placeholder="Idade">
            </div>

            <div class="grupo-formulario">
                <label>Email</label>
                <input type="email" id="emailAluno" placeholder="Email">
            </div>

            <button class="botao botao-primario" onclick="cadastrarAluno()">
                Cadastrar Aluno
            </button>

        </section>

        <!-- TABELA -->
        <section class="tabela-container">

            <table>

                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Idade</th>
                        <th>Email</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="listaAlunos"></tbody>

            </table>

        </section>

    </main>

    <script src="../tema/tema.js"></script>
    <script src="../js/alunos.js"></script>

</body>
</html>
