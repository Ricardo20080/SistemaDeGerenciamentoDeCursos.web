<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alunos</title>

    <link rel="stylesheet" href="../base/base.css">
<link rel="stylesheet" href="../tema/tema.css">
<link rel="stylesheet" href="../css/alunos.css">

</head>

<body>

<!-- =========================
SIDEBAR
========================= -->

<aside class="barra-lateral">

    <div>
        <div class="logo">
            <h2>👨‍🎓 Alunos</h2>
            <span>Lista automática do sistema</span>
        </div>

        <nav class="menu">
            <a href="../index.html">🏠 Dashboard</a>
            <a href="cursos.html">📖 Cursos</a>
            <a href="alunos.html" class="ativo">👨‍🎓 Alunos</a>
            <a href="matriculas.html">📝 Matrículas</a>
            <a href="notas.html">📊 Notas</a>
            <a href="certificados.html">🏆 Certificados</a>
        </nav>
    </div>

    <div class="rodape-menu">
        <button id="alternarTema">🌙 Tema</button>
    </div>

</aside>

<!-- =========================
CONTEÚDO
========================= -->

<main class="conteudo">

    <header class="cabecalho">
        <div>
            <h1>Alunos</h1>
            <p>Lista gerada automaticamente a partir das matrículas</p>
        </div>
    </header>

    <!-- =========================
    BUSCA
    ========================= -->

    <section class="filtro-cursos">

    <input
        id="buscaAluno"
        type="text"
        placeholder="Buscar aluno pelo nome..."
        onkeyup="buscarAluno()"
    >

    <button
        class="botao-primario"
        onclick="buscarAluno()">

        Buscar

    </button>

</section>

    <!-- =========================
    TABELA
    ========================= -->

    <section class="tabela-container">

        <table>
            <thead>
    <tr>
        <th>Nome</th>
        <th>ID Matrícula</th>
        <th>Curso</th>
        <th>Status</th>
        <th>Ações</th>
    </tr>
</thead>

            <tbody id="listaAlunos"></tbody>
        </table>

    </section>

</main>


    
    <script src="../base/storage.js"></script>
<script src="../tema/tema.js"></script>
<script src="../js/alunos.js"></script>

</body>
</html>
