<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cursos - Sistema de Gestão de Cursos</title>

    <link rel="stylesheet" href="../css/cursos.css">
    <link rel="stylesheet" href="../tema/tema.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <!-- MENU LATERAL -->
    <aside class="barra-lateral">

        <div>

            <div class="logo">
                <h2>📚 Cursos</h2>
                <span>Painel Administrativo</span>
            </div>

            <nav class="menu">

                <a href="../index.html">🏠 Dashboard</a>
                <a href="cursos.html" class="ativo">📖 Cursos</a>
                <a href="alunos.html">👨‍🎓 Alunos</a>
                <a href="matriculas.html">📝 Matrículas</a>
                <a href="notas.html">📊 Notas</a>
                <a href="certificados.html">🏆 Certificados</a>

            </nav>

        </div>

        <div class="rodape-menu">

            <button id="alternarTema">
                🌙 Tema Escuro
            </button>

        </div>

    </aside>

    <!-- CONTEÚDO -->
    <main class="conteudo">

        <!-- CABEÇALHO -->
        <header class="cabecalho">

            <div>
                <h1>Gerenciamento de Cursos</h1>
                <p>Cadastre, visualize e gerencie os cursos da instituição.</p>
            </div>

        </header>

        <!-- FORMULÁRIO -->
        <section class="formulario">

            <h2>Novo Curso</h2>

            <form id="formCurso">

                <div class="grupo-formulario">
                    <label>Nome do Curso</label>
                    <input type="text" id="nomeCurso" placeholder="Ex: Informática Básica" required>
                </div>

                <div class="grupo-formulario">
                    <label>Carga Horária (Horas)</label>
                    <input type="number" id="cargaHoraria" placeholder="Ex: 40" required>
                </div>

                <div class="grupo-formulario">
                    <label>Professor Responsável</label>
                    <input type="text" id="professor" placeholder="Nome do professor" required>
                </div>

                <!-- 🔥 NOVO: ESTRUTURA DO CURSO -->
                <div class="grupo-formulario">
                    <label>Estrutura do Curso (Módulos / Semestres / Disciplinas)</label>

                    <div id="estruturaContainer"></div>

                    <button type="button" class="botao" onclick="adicionarEstrutura()">
                        + Adicionar item
                    </button>
                </div>

                <button
                    type="button"
                    class="botao botao-primario"
                    onclick="salvarCurso()">

                    Salvar Curso

                </button>

            </form>

        </section>

        <!-- PESQUISA -->
        <section class="filtro-cursos">

            <input
                type="text"
                id="pesquisaCurso"
                placeholder="🔍 Pesquisar curso...">

        </section>

        <!-- LISTAGEM -->
        <section class="tabela-container">

            <table>

                <thead>

                    <tr>
                        <th>Curso</th>
                        <th>Carga Horária</th>
                        <th>Professor</th>
                        <th>Ações</th>
                    </tr>

                </thead>

                <tbody id="listaCursos">
                    <!-- JS -->
                </tbody>

            </table>

        </section>

    </main>

    <!-- SCRIPTS -->
    <script src="../tema/tema.js"></script>
    <script src="../js/cursos.js"></script>

</body>

</html>
